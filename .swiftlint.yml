# .swiftlint.yml — Studio.92

# Paths to lint
included:
  - Sources
  - CommandCenter
  - Tests

excluded:
  - .build
  - DerivedData
  - CommandCenter/CommandCenter.xcodeproj
  - CommandCenter/Resources

# Rules that catch real bugs
opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - legacy_multiple
  - legacy_random
  - modifier_order
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unowned_variable_capture
  - yoda_condition

# Turn off rules that conflict with project conventions or are too noisy
disabled_rules:
  - trailing_whitespace          # too noisy during rapid iteration
  - todo                         # we use TODO/FIXME intentionally
  - line_length                  # managed via code review, not lint
  - type_body_length             # tracked in audit, not lint
  - file_length                  # tracked in audit, not lint
  - function_body_length         # some pipeline functions are legitimately long
  - cyclomatic_complexity        # tracked in audit
  - nesting                      # SwiftUI views nest naturally
  - identifier_name              # single letter vars ok in closures
  - colon                        # 227 existing violations — fix incrementally
  - comma                        # 79 existing violations — style only
  - trailing_comma               # 27 existing — project uses trailing commas intentionally
  - statement_position            # 20 existing — else-on-same-line style preference
  - closure_parameter_position   # 19 existing — style only
  - vertical_whitespace          # 21 existing — style only
  - opening_brace                # 16 existing — style only
  - trailing_newline             # 14 existing — style only
  - multiple_closures_with_trailing_closure  # SwiftUI pattern
  - for_where                    # style preference
  - control_statement            # style preference
  - implicit_optional_initialization  # style preference
  - optional_data_string_conversion    # 22 existing — opt-in, fix incrementally
  - discouraged_optional_boolean       # 9 existing — opt-in, booleans are fine here
  - non_optional_string_data_conversion # opt-in, style only

# Thresholds
large_tuple:
  warning: 4
  error: 6

function_parameter_count:
  warning: 8
  error: 12

force_cast:
  severity: error

force_try:
  severity: warning

force_unwrapping:
  severity: warning

# Reporter for CI (overridden in workflow via --reporter flag)
reporter: xcode
